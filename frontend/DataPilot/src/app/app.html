<div class="shell">
    <header class="topbar">
        <div class="brand">
            <span class="dot" aria-hidden="true"></span>
            <div>
                <p class="title">DataPilot</p>
                <p class="subtitle">ML Workflow Console</p>
            </div>
        </div>

        <nav class="nav" aria-label="Main navigation">
            <a routerLink="/upload" routerLinkActive="active">Upload</a>
            <a routerLink="/train" routerLinkActive="active">Train</a>
            <a routerLink="/results" routerLinkActive="active">Results</a>
        </nav>
    </header>

    <main class="content">
        <aside class="status-card">
            <h2>Current Job</h2>
            <p>Job ID: {{ jobId() ?? 'None' }}</p>
            <p>Status: {{ latestResult()?.status ?? 'idle' }}</p>
            <p class="health" [class.online]="backendHealth() === 'online'"
                [class.offline]="backendHealth() === 'offline'">
                API: {{ backendHealth() }}
            </p>
        </aside>

        <section class="stage">
            <router-outlet />
        </section>
    </main>
</div>
